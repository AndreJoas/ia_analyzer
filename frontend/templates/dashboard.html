<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Dashboard - Análise de Currículos</title>
    <link rel="stylesheet" href="/static/style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 0;
        }
        
        .dashboard-container {
            padding: 30px;
            max-width: 1200px;
            margin: auto;
        }
        
        .dashboard-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 25px;
        }
        /* 🔥 cards */
        
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
        }
        
        .card h3 {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        
        .card .value {
            font-size: 32px;
            font-weight: bold;
        }
        /* 🔥 gráfico */
        
        .chart-box {
            background: #1e293b;
            padding: 25px;
            border-radius: 14px;
        }
        
        canvas {
            max-height: 400px;
        }
        /* navbar fake se não tiver */
        
        .navbar {
            background: #020617;
            padding: 15px 30px;
            border-bottom: 1px solid #1e293b;
        }
        
        .navbar a {
            color: white;
            margin-right: 20px;
            text-decoration: none;
            font-weight: bold;
        }
        
        .navbar a:hover {
            color: #38bdf8;
        }
    </style>
</head>

<body>

    <!-- 🔥 NAVBAR -->
    <div class="navbar">
        <a href="{{ url_for('chat_page') }}">Home</a>
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('chat_page') }}">Chat</a>
        <a href="{{ url_for('logout') }}">Sair</a>
    </div>

    <div class="dashboard-container">

        <div class="dashboard-title">
            📊 Dashboard de Análises
        </div>

        <!-- 🔥 CARDS -->
        <div class="cards">
            <div class="card">
                <h3>Total de Análises</h3>
                <div class="value" id="totalAnalises">0</div>
            </div>

            <div class="card">
                <h3>Score Médio</h3>
                <div class="value" id="scoreMedio">0</div>
            </div>

            <div class="card">
                <h3>Última Atualização</h3>
                <div class="value" id="ultimaAtualizacao">—</div>
            </div>
        </div>

        <!-- 🔥 GRÁFICO -->
        <div class="chart-box">
            <h3 style="margin-bottom:15px;">Distribuição de Scores</h3>
            <canvas id="scoreChart"></canvas>
        </div>
        <!-- 🔥 MODAL HISTÓRICO -->
        <div id="scoreModal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>📄 Detalhes da Análise</h2>
                    <button class="modal-close" onclick="closeModal()">✕</button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- conteúdo dinâmico -->
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>

    <script>
        // 🔥 proteção para garantir que DOM carregou
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof loadDashboard === "function") {
                loadDashboard();

                // atualiza timestamp
                const now = new Date().toLocaleString("pt-BR");
                const el = document.getElementById("ultimaAtualizacao");
                if (el) el.textContent = now;
            } else {
                console.error("loadDashboard não encontrado");
            }
        });
        // ===============================
        // MODAL HISTÓRICO
        // ===============================

        // Abre o modal com os dados de um histórico específico
        async function showModal(id) {
            const modal = document.getElementById("scoreModal");
            const modalBody = document.getElementById("modalBody");
            if (!modal || !modalBody) return;

            try {
                const response = await fetch("/historico");
                const data = await response.json();

                const item = data.find(h => h.id === id);
                if (!item) {
                    modalBody.innerHTML = "<p>Histórico não encontrado.</p>";
                } else {
                    modalBody.innerHTML = `
  <div style="display:flex; flex-direction:column; gap:12px; max-height:70vh; overflow-y:auto;">
    ${Object.entries(item).map(([key, value]) => `
      <div style="
        background:#1e293b; 
        padding:12px 16px; 
        border-radius:10px; 
        box-shadow:0 2px 8px rgba(0,0,0,0.3);
      ">
        <strong>${key.charAt(0).toUpperCase() + key.slice(1)}:</strong> ${value ?? "—"}
      </div>
    `).join('')}
  </div>
`;
                }

                modal.style.display = "flex"; // abre modal
            } catch (err) {
                console.error("Erro ao abrir modal:", err);
                modalBody.innerHTML = "<p>Erro ao carregar histórico.</p>";
                modal.style.display = "flex";
            }
        }

        // Fecha o modal
        function closeModal() {
            const modal = document.getElementById("scoreModal");
            if (!modal) return;
            modal.style.display = "none";
        }

        // Fecha modal ao clicar fora do conteúdo
        window.addEventListener("click", (e) => {
            const modal = document.getElementById("scoreModal");
            if (e.target === modal) closeModal();
        });
    </script>

</body>

</html>
